<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enter Idea - SWOT Analyzer</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'mainapp/style-darkgreen.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="{% url 'home' %}">SWOT Analyzer</a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" href="{% url 'feedback' %}">Feedback</a>
      <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-2">Generate SWOT Analysis</h3>
          <p class="text-muted mb-4">Category: <span class="fw-semibold">{{ category }}</span></p>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <form method="post" id="ideaForm">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Your idea</label>
              <textarea name="idea" id="idea" class="form-control" rows="6" placeholder="Type your business/project idea..."></textarea>
            </div>
            <div class="d-grid">
              <button class="btn btn-primary" type="submit" id="submitBtn">
                Generate SWOT Analysis
              </button>
            </div>

            <div id="loading" class="mt-3 d-none">
              <div class="spinner-border text-primary" role="status"></div>
              <span class="ms-2">AI is generating your SWOT...</span>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('ideaForm');
  const loading = document.getElementById('loading');
  const submitBtn = document.getElementById('submitBtn');
  form?.addEventListener('submit', () => {
    loading?.classList.remove('d-none');
    submitBtn && (submitBtn.disabled = true);
  });
</script>
</body>
</html>
