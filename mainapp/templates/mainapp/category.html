<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Choose Category - SWOT Analyzer</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'mainapp/style-darkgreen.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="{% url 'home' %}">SWOT Analyzer</a>
    <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Logout</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-2">Select a category</h3>
          <p class="text-muted mb-4">This helps the AI tailor the SWOT analysis.</p>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <form method="post">
            {% csrf_token %}
            <div class="row g-3">
              {% for c in categories %}
                <div class="col-md-6">
                  <button class="btn btn-outline-primary w-100 py-3" type="submit" name="category" value="{{ c }}">
                    {{ c }}
                  </button>
                </div>
              {% endfor %}
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
