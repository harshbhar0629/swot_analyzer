<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback - SWOT Analyzer</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'mainapp/style-darkgreen.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">SWOT Analyzer</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <h2 class="mb-3">Your Feedback</h2>

      {% for message in messages %}
        <div class="alert alert-info">{{ message }}</div>
      {% endfor %}

      <form method="post" class="card p-4 shadow-sm bg-white">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Rating</label>
          <div class="d-flex gap-2">
            {% for i in "12345"|make_list %}
              {% comment %} fallback if template filter not present {% endcomment %}
              <input type="radio" class="btn-check" name="rating" id="star{{ i }}" value="{{ i }}" autocomplete="off">
              <label class="btn btn-outline-warning" for="star{{ i }}">{{ i }}★</label>
            {% endfor %}
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Suggestion (optional)</label>
          {{ form.suggestion }}
        </div>

        <div class="mb-3">
          <label class="form-label">Comments</label>
          {{ form.message }}
        </div>

        <button class="btn btn-primary w-100" type="submit">Submit Feedback</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
